<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专利申请辅助工作流集合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 1600px;
            width: 100%;
        }

        h1 {
            color: white;
            margin-bottom: 50px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .nav-buttons {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 300px;
            max-width: 380px;
        }

        .column-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .column-title {
            color: white;
            font-size: 1.3rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            flex: 1;
            text-align: center;
        }

        .nav-btn {
            display: inline-block;
            padding: 16px 24px;
            font-size: 1.05rem;
            color: #667eea;
            background: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            min-width: 260px;
            text-align: center;
            word-break: break-word;
        }

        .nav-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            background: #f8f9fa;
        }

        .nav-btn:active {
            transform: translateY(-2px);
        }

        .btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .description {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            margin-top: 6px;
            text-align: left;
        }

        /* 响应式 */
        @media (max-width: 992px) {
            .nav-buttons { gap: 30px; }
        }
        @media (max-width: 768px) {
            .nav-buttons { flex-direction: column; align-items: center; }
            .nav-btn { min-width: 240px; padding: 14px 20px; font-size: 0.95rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 专利申请辅助工作流集合</h1>
        <div class="nav-buttons" id="navButtons">
            <!-- 列由JS动态渲染 -->
        </div>
    </div>

    <script>
        // 预设主题配色
        const COLOR_SCHEMES = [
            { name: '蓝紫', btnBg: 'linear-gradient(135deg, #fff 0%, #e8f4ff 100%)', btnBgHover: 'linear-gradient(135deg, #e8f4ff 0%, #d0e8ff 100%)', btnColor: '#4a90d9' },
            { name: '紫色', btnBg: 'linear-gradient(135deg, #fff 0%, #f0e8ff 100%)', btnBgHover: 'linear-gradient(135deg, #f0e8ff 0%, #e0d0ff 100%)', btnColor: '#8a5fd9' },
            { name: '青绿', btnBg: 'linear-gradient(135deg, #fff 0%, #e8fff4 100%)', btnBgHover: 'linear-gradient(135deg, #e8fff4 0%, #d0ffe8 100%)', btnColor: '#2db37d' },
            { name: '橙黄', btnBg: 'linear-gradient(135deg, #fff 0%, #fff8e8 100%)', btnBgHover: 'linear-gradient(135deg, #fff8e8 0%, #ffe8c0 100%)', btnColor: '#e8943a' },
            { name: '粉红', btnBg: 'linear-gradient(135deg, #fff 0%, #ffe8f0 100%)', btnBgHover: 'linear-gradient(135deg, #ffe8f0 0%, #ffd0e0 100%)', btnColor: '#d94a7a' },
            { name: '灰蓝', btnBg: 'linear-gradient(135deg, #fff 0%, #e8ecf4 100%)', btnBgHover: 'linear-gradient(135deg, #e8ecf4 0%, #d0d8ec 100%)', btnColor: '#5a6d9a' },
        ];

        // 初始数据
        let columns = [
            {
                id: 'col1',
                title: '📝 专利申请',
                colorIdx: 0,
                buttons: [
                    { id: 'b1', name: '🔧 专利申请辅助工具（集成板）', url: 'https://brainmaker.netease.com/v3?model=chatFlow_93573c47-c682-4684-b81c-77e6e197c308', desc: '一站式专利申请辅助', integrated: true },
                    { id: 'b2', name: '✅ 权利要求审核', url: 'https://brainmaker.netease.com/v3?model=chatFlow_3813aef1-eaf9-41a5-9214-c5efa46588c8', desc: '1.审核权利要求书\n2.追问进一步修改', integrated: false },
                    { id: 'b12', name: '✍️ GLM 5.2 权利要求撰写（推荐）', url: 'https://brainmaker.netease.com/v3?model=chatFlow_757e3fb2-8391-4bfc-afd8-4cab00c89f91', desc: '1.理解技术交底书\n2.撰写权利要求书', integrated: false },
                    { id: 'b3', name: '✍️ Kimi 2.6 权利要求撰写', url: 'https://brainmaker.netease.com/v3?model=chatFlow_e22ffd27-16c7-4ea6-a3a2-f073c4146cf2', desc: '1.理解技术交底书\n2.撰写权利要求书', integrated: false },
                    { id: 'b4', name: '📄 说明书撰写', url: 'https://brainmaker.netease.com/v3?model=chatFlow_c781e80b-dac0-49b4-b2db-dce14972c758', desc: '1.撰写专利说明书\n2.撰写特定权利要求实施例\n3.撰写特定技术特征元素实施例\n4.撰写背景技术\n5.交互式修改撰写背景技术', integrated: false },
                    { id: 'b11', name: '🪄 一键去AI味（新增）', url: 'https://brainmaker.netease.com/v3?model=chatFlow_04b4785a-003e-4ecf-bcea-810eddc9472c', desc: '一键去除AI生成痕迹', integrated: false },
                ]
            },
            {
                id: 'col2',
                title: '💬 答复审查意见',
                colorIdx: 1,
                buttons: [
                    { id: 'b5', name: '🔧 答复审查意见（集成板）', url: 'https://brainmaker.netease.com/v3?model=chatFlow_70ad559a-49b8-4f38-801f-b7897e0490a0', desc: '一站式答复审查意见', integrated: true },
                    { id: 'b6', name: '🔍 答复审查意见[审核]', url: 'https://brainmaker.netease.com/v3?model=chatFlow_ec271190-b13d-4aed-86be-07894892c83b', desc: '审核答复意见', integrated: false },
                    { id: 'b7', name: '✏️ 答复审查意见[撰写]', url: 'https://brainmaker.netease.com/v3?model=chatFlow_70cae461-ca98-412e-8c55-e833e4914692', desc: '撰写答复意见', integrated: false },
                ]
            },
            {
                id: 'col3',
                title: '📊 腾讯监控',
                colorIdx: 2,
                buttons: [
                    { id: 'b8', name: '📈 腾讯监控', url: 'https://brainmaker.netease.com/v3?model=workFlow_c69793fd-e712-4fa1-aa20-8a19415fc28e', desc: '1.针对权利要求和说明书进行发明点提取\n2.仅针对说明书进行发明点提取', integrated: true },
                ]
            },
            {
                id: 'col4',
                title: '🎨 绘图相关',
                colorIdx: 3,
                buttons: [
                    { id: 'b9', name: '🎨 Figma', url: 'https://www.figma.com/design/8fWttcG6PjnWgqk6J93rOP/%E5%B0%84%E5%87%BB?node-id=0-1&p=f&t=gG77QjhiLZphQTwl-0', desc: 'Figma设计协作', integrated: false },
                    { id: 'b10', name: '🖌️ DreamMaker', url: 'https://dreammaker.netease.com/2d', desc: 'DreamMaker 2D绘图', integrated: false },
                ]
            },
        ];

        // ============ 渲染 ============

        function renderAll() {
            const container = document.getElementById('navButtons');
            container.innerHTML = '';

            columns.forEach((col, colIdx) => {
                const scheme = COLOR_SCHEMES[col.colorIdx] || COLOR_SCHEMES[0];
                const colDiv = document.createElement('div');
                colDiv.className = 'column';
                colDiv.dataset.colId = col.id;

                // 列头
                const header = document.createElement('div');
                header.className = 'column-header';
                header.innerHTML = `
                    <h2 class="column-title" id="title_${col.id}">${col.title}</h2>
                `;
                colDiv.appendChild(header);

                // 按钮
                col.buttons.forEach(btn => {
                    colDiv.appendChild(createBtnWrapper(btn, col.id));
                });

                container.appendChild(colDiv);
            });

            applyColumnStyles();
        }

        function createBtnWrapper(btn, colId) {
            const wrapper = document.createElement('div');
            wrapper.className = 'btn-wrapper';
            wrapper.dataset.btnId = btn.id;

            const a = document.createElement('a');
            a.href = btn.url;
            a.className = 'nav-btn' + (btn.integrated ? ' integrated' : '');
            a.target = '_blank';
            a.textContent = btn.name;

            wrapper.appendChild(a);

            if (btn.desc) {
                const descEl = document.createElement('div');
                descEl.className = 'description';
                btn.desc.split('\n').forEach(line => {
                    const span = document.createElement('span');
                    span.textContent = line;
                    span.style.display = 'block';
                    descEl.appendChild(span);
                });
                wrapper.appendChild(descEl);
            }

            return wrapper;
        }

        function applyColumnStyles() {
            let css = '';
            columns.forEach(col => {
                const scheme = COLOR_SCHEMES[col.colorIdx] || COLOR_SCHEMES[0];
                css += `
                    .column[data-col-id="${col.id}"] .nav-btn {
                        background: ${scheme.btnBg};
                        color: ${scheme.btnColor};
                    }
                    .column[data-col-id="${col.id}"] .nav-btn:hover {
                        background: ${scheme.btnBgHover};
                    }
                `;
            });

            let styleEl = document.getElementById('dynColStyles');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'dynColStyles';
                document.head.appendChild(styleEl);
            }
            styleEl.textContent = css;
        }

        // ============ 初始渲染 ============
        renderAll();
    </script>
</body>
</html>
