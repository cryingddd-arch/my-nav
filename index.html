<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专利申请辅助工作流集合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: white;
            margin-bottom: 50px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .nav-buttons {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            display: inline-block;
            padding: 20px 40px;
            font-size: 1.2rem;
            color: #667eea;
            background: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            min-width: 200px;
        }

        .nav-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            background: #f8f9fa;
        }

        .nav-btn:active {
            transform: translateY(-2px);
        }

        .nav-btn.btn-1 {
            background: linear-gradient(135deg, #fff 0%, #e8f4ff 100%);
        }

        .nav-btn.btn-2 {
            background: linear-gradient(135deg, #fff 0%, #f0e8ff 100%);
        }

        .description {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 我的导航页</h1>
        <div class="nav-buttons">
            <div class="btn-wrapper">
                <a href="https://brainmaker.netease.com/v3?model=chatFlow_ec271190-b13d-4aed-86be-07894892c83b" 
                   class="nav-btn btn-1" 
                   target="_blank">
                    📌 答复审查意见[审核]
                </a>
                <p class="description">ChatFlow 应用 1</p>
            </div>
            <div class="btn-wrapper">
                <a href="https://brainmaker.netease.com/v3?model=chatFlow_70cae461-ca98-412e-8c55-e833e4914692" 
                   class="nav-btn btn-2" 
                   target="_blank">
                    📌 答复审查意见[撰写]
                </a>
                <p class="description">ChatFlow 应用 2</p>
            </div>
        </div>
    </div>
</body>
</html>
