<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专利申请辅助工作流集合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            color: white;
            margin-bottom: 50px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .nav-buttons {
            display: flex;
            gap: 60px;
            justify-content: center;
            align-items: flex-start;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .column-title {
            color: white;
            font-size: 1.3rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }

        .nav-btn {
            display: inline-block;
            padding: 18px 30px;
            font-size: 1.1rem;
            color: #667eea;
            background: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            min-width: 280px;
            text-align: center;
        }

        .nav-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            background: #f8f9fa;
        }

        .nav-btn:active {
            transform: translateY(-2px);
        }

        /* 左侧按钮样式 - 蓝色系 */
        .left-column .nav-btn {
            background: linear-gradient(135deg, #fff 0%, #e8f4ff 100%);
            color: #4a90d9;
        }

        .left-column .nav-btn:hover {
            background: linear-gradient(135deg, #e8f4ff 0%, #d0e8ff 100%);
        }

        /* 右侧按钮样式 - 紫色系 */
        .right-column .nav-btn {
            background: linear-gradient(135deg, #fff 0%, #f0e8ff 100%);
            color: #8a5fd9;
        }

        .right-column .nav-btn:hover {
            background: linear-gradient(135deg, #f0e8ff 0%, #e0d0ff 100%);
        }

        /* 集成板按钮特殊样式 */
        .nav-btn.integrated {
            font-weight: bold;
            border: 2px solid rgba(102, 126, 234, 0.3);
        }

        .btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .description {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            margin-top: 8px;
        }

        /* 响应式布局 */
        @media (max-width: 768px) {
            .nav-buttons {
                flex-direction: column;
                gap: 40px;
            }

            .nav-btn {
                min-width: 260px;
                padding: 15px 25px;
                font-size: 1rem;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
